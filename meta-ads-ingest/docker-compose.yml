version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: meta_user
      POSTGRES_PASSWORD: meta_password
      POSTGRES_DB: meta_ads
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meta_user -d meta_ads"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: .
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-meta_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-meta_password}
      - POSTGRES_DB=${POSTGRES_DB:-meta_ads}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID}
    depends_on:
      postgres:
        condition: service_healthy
    command: node fetch-meta-ads.js

volumes:
  postgres_data:
